<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button class="blue" onclick="clearDisplay()">AC</button>
            <button class="lightblue" onclick="addToDisplay('(')">(</button>
            <button class="lightblue" onclick="addToDisplay(')')">)</button>
            <button class="lightblue" onclick="addToDisplay('/')">/</button>
            <button onclick="addToDisplay('7')">7</button>
            <button onclick="addToDisplay('8')">8</button>
            <button onclick="addToDisplay('9')">9</button>
            <button class="lightblue" onclick="addToDisplay('*')">*</button>
            <button onclick="addToDisplay('4')">4</button>
            <button onclick="addToDisplay('5')">5</button>
            <button onclick="addToDisplay('6')">6</button>
            <button class="lightblue" onclick="addToDisplay('-')">-</button>
            <button onclick="addToDisplay('1')">1</button>
            <button onclick="addToDisplay('2')">2</button>  
            <button onclick="addToDisplay('3')">3</button>
            <button class="lightblue" onclick="addToDisplay('+')">+</button>
            <button onclick="addToDisplay('0')">0</button>
            <button onclick="addToDisplay('.')">.</button>
            <button onclick="deleteLastCharacter()">DEL</button>
            <button class="pink" onclick="calculateResult()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById("display");

        function addToDisplay(input) {
            display.value += input;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLastCharacter() {
            display.value = display.value.slice(0, -1);
        }

        function calculateResult() {
            try {
                // Using a safer function approach for calculations
                display.value = new Function('return ' + display.value)();
            } catch (error) {
                display.value = "Error";
            }
        }
    </script>
</body>
</html>
